name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/ecommerce

jobs:
  # ─── Detect which services changed ──────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      user-service:         ${{ steps.filter.outputs.user-service }}
      product-service:      ${{ steps.filter.outputs.product-service }}
      cart-service:         ${{ steps.filter.outputs.cart-service }}
      order-service:        ${{ steps.filter.outputs.order-service }}
      payment-service:      ${{ steps.filter.outputs.payment-service }}
      notification-service: ${{ steps.filter.outputs.notification-service }}
      api-gateway:          ${{ steps.filter.outputs.api-gateway }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            user-service:
              - 'user-service/**'
            product-service:
              - 'product-service/**'
            cart-service:
              - 'cart-service/**'
            order-service:
              - 'order-service/**'
            payment-service:
              - 'payment-service/**'
            notification-service:
              - 'notification-service/**'
            api-gateway:
              - 'api-gateway/**'

  # ─── Lint & Test ─────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: changes
    strategy:
      fail-fast: false
      matrix:
        service:
          - user-service
          - product-service
          - cart-service
          - order-service
          - payment-service
          - notification-service

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       testdb
          POSTGRES_USER:     testuser
          POSTGRES_PASSWORD: testpass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm ci

      - name: Run linter
        working-directory: ${{ matrix.service }}
        run: npm run lint --if-present

      - name: Run tests
        working-directory: ${{ matrix.service }}
        env:
          NODE_ENV:    test
          DB_HOST:     localhost
          DB_PORT:     5432
          DB_NAME:     testdb
          DB_USER:     testuser
          DB_PASSWORD: testpass
          REDIS_URL:   redis://localhost:6379
          JWT_SECRET:  test_jwt_secret
          RABBITMQ_URL: amqp://guest:guest@localhost:5672
        run: npm test --if-present

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: ${{ matrix.service }}/coverage
          flags: ${{ matrix.service }}

  # ─── Build & Push Docker images ──────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - user-service
          - product-service
          - cart-service
          - order-service
          - payment-service
          - notification-service
          - api-gateway

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix={{branch}}-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

  # ─── Deploy to staging ────────────────────────────────────────────────────────
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.yourstore.com

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key:      ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/ecommerce
            git pull origin develop
            docker compose pull
            docker compose up -d --remove-orphans
            docker system prune -f

      - name: Run smoke tests
        run: |
          sleep 15
          curl -f https://staging.yourstore.com/health || exit 1
          echo "Staging deployment successful"

  # ─── Deploy to production ─────────────────────────────────────────────────────
  deploy-production:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://yourstore.com

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key:      ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/ecommerce
            git pull origin main

            # Rolling update – one service at a time
            for svc in user-service product-service cart-service order-service payment-service notification-service api-gateway; do
              echo "Updating $svc..."
              docker compose pull $svc
              docker compose up -d --no-deps $svc
              sleep 5
              # Health check before continuing
              docker compose ps $svc | grep -q "healthy" || exit 1
            done

            docker system prune -f
            echo "Production deployment complete"

      - name: Post-deploy health checks
        run: |
          sleep 20
          curl -f https://yourstore.com/health          || exit 1
          curl -f https://yourstore.com/api/v1/products || exit 1
          echo "All health checks passed"

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚨 Production deployment FAILED for commit ${{ github.sha }} by ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
