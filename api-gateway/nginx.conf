worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_addr":"$upstream_addr",'
            '"http_referrer":"$http_referer",'
            '"http_user_agent":"$http_user_agent"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ── Rate Limiting ─────────────────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr  zone=api_limit:10m   rate=60r/m;
    limit_req_zone  $binary_remote_addr  zone=auth_limit:10m  rate=10r/m;
    limit_conn_zone $binary_remote_addr  zone=conn_limit:10m;

    # ── Upstreams ─────────────────────────────────────────────────────────────
    upstream user_service {
        least_conn;
        server user-service:3001;
        keepalive 32;
    }

    upstream product_service {
        least_conn;
        server product-service:3002;
        keepalive 32;
    }

    upstream cart_service {
        least_conn;
        server cart-service:3003;
        keepalive 32;
    }

    upstream order_service {
        least_conn;
        server order-service:3004;
        keepalive 32;
    }

    upstream payment_service {
        least_conn;
        server payment-service:3005;
        keepalive 32;
    }

    # ── Common proxy headers ───────────────────────────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";
    proxy_http_version 1.1;
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    # ── Main Server ───────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        limit_conn conn_limit 20;

        # Health check endpoint (no auth required)
        location /health {
            access_log off;
            return 200 '{"status":"ok","service":"api-gateway"}';
            add_header Content-Type application/json;
        }

        # ── Auth routes (stricter rate limit) ─────────────────────────────────
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://user_service/api/v1/auth/;
        }

        # ── User routes ───────────────────────────────────────────────────────
        location /api/v1/users/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://user_service/api/v1/users/;
        }

        # ── Product routes (public read, protected write) ──────────────────────
        location /api/v1/products/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://product_service/api/v1/products/;
        }

        location /api/v1/categories/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://product_service/api/v1/categories/;
        }

        # ── Cart routes ───────────────────────────────────────────────────────
        location /api/v1/cart/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://cart_service/api/v1/cart/;
        }

        # ── Order routes ──────────────────────────────────────────────────────
        location /api/v1/orders/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://order_service/api/v1/orders/;
        }

        # ── Payment routes ────────────────────────────────────────────────────
        location /api/v1/payments/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://payment_service/api/v1/payments/;
        }

        # ── Payment webhooks (no rate limit for external providers) ───────────
        location /api/v1/webhooks/ {
            proxy_pass http://payment_service/api/v1/webhooks/;
        }

        # ── Default 404 ───────────────────────────────────────────────────────
        location / {
            return 404 '{"error":"Route not found"}';
            add_header Content-Type application/json;
        }
    }
}
